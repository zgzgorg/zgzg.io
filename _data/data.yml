programmes:
  - name: 职挂云帆
    image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/v1670660306/zgzg-io-website/%E4%BA%91%E9%9B%86/%E8%81%8C%E6%8C%82%E4%BA%91%E5%B8%86_sjdst6.jpg
    description: 职场访谈类节目。活动内容涵盖，科技，创业，生物医疗，职场软技能等多个方向。
    button-url: https://www.youtube.com/channel/UCG2VTUUT3OWEYcAEi3ELamA
    button-text: YouTube 频道
  - name: 云集音乐会
    image: https://res.cloudinary.com/zaigezaigu/image/upload/v1766799004/zgzg-io-website/%E4%BA%91%E9%9B%86/YBYF/yunji_concert_yacmxf.jpg
    description: 致力于打造一个让音乐爱好者共同交流、共同创作、共同成长的梦想孵化器。我们不只关注音乐本身，更关注音乐背后的连接。在这里，无论你是创作者还是演绎者，都能找到志同道合的伙伴。我们定期举办面向公众的中大型Live音乐会，以专业级的策划与制作，为音乐爱好者提供闪耀的展示舞台，更为广大观众呈现一场场由热爱铸就的主题视听盛宴。
    button-url: /ybyf/
    button-text: 往期精选
  - name: 书影婆娑
    image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/v1670658918/zgzg-io-website/%E4%BA%91%E9%9B%86/shuying_o2xeyt.jpg
    description: 我们组织多种书籍电影类文化活动：线下分享会、客厅沙龙、好书共读、P2P图书馆、朗读会、电影马拉松……
    button-url: https://mp.weixin.qq.com/s/Llop7DVDmyHwg_Jycv5w3A
    button-text: 了解更多
  - name: 体娱风云
    image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/v1670659563/zgzg-io-website/%E4%BA%91%E9%9B%86/Screen_Shot_2022-12-10_at_00.05.57_yinbrf.png
    description: 我们组织羽毛球、桌游、趣味运动会、聚餐等线上及线下社交娱乐项目。为大家体验到社交的快乐而努力。
    button-url: https://mp.weixin.qq.com/s/udxxeHXpuQP3Nfaq0_JYdg
    button-text: 近期活动

