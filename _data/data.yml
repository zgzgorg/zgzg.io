2026-gala-hosts:
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1767592703/zgzg-io-website/2026%E6%98%A5%E6%99%9A/%E7%BD%97%E6%B3%BD%E4%B8%AD_adyqfp.jpg
    name: 罗泽中
    description: |
      中国传媒大学播音与主持艺术本科、北大艺术硕士。曾在中国教育电视台、旅游卫视、广东卫视等国家级及省级媒体主持多档节目。拥有丰富的大型活动主持经验，足迹遍布人民大会堂、政协礼堂、地质礼堂等；主持领域横跨文娱与体育，首届斯坦科维奇洲际篮球冠军杯现场主持。

      移居海外后，拥有主持、编导、演员等多重艺术身份。连续多年担任“载歌载谷”春晚主持；深耕儿童艺术教育，编导作品斩获金画眉“特别优秀剧本”及“优秀导演”奖；“戏谷剧团”话剧《今生有约》《领带 vs. 高跟鞋》执行制作人、主演。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1767592703/zgzg-io-website/2026%E6%98%A5%E6%99%9A/%E8%92%8B%E7%91%9C%E5%A9%A7_qmirzi.jpg
    name: 蒋瑜婧
    description: |
      美国加州旧金山湾区知名专业中英双语主持人，中国传媒大学播音与主持艺术学士，香港理工大学双语研究硕士。她以融合国际视野与东方气韵的主持风格，活跃于中、英、美多国舞台，主持领域涵盖大型文艺晚会、官方庆典及高规格国际盛会。曾任中国教育电视台、云南卫视节目主持人，并作为国家外派主持人驻英国伦敦，参与官方文化交流，屡获中国地方政府及驻外使领馆邀请，担任重要活动中英双语主持。

      代表性主持经历:
      - 中国—南亚博览会开幕式
      - 中国驻曼彻斯特总领馆“全英元宵晚会”及“新春招待会”
      - 中国驻旧金山总领馆“内蒙古与加州建立友好关系25周年庆”及电影《南京照相馆》旧金山首映式
      - 云南省春节晚会
      - 2025年旧金山湾区大型文艺晚会“中国之夜”
      - 2025年国际时尚旅游小姐旧金山决赛
      - 2025年“载歌在谷”蛇年春晚

