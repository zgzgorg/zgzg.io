  - name: 舞蹈《喜鹊喳喳喳》
    image: https://res.cloudinary.com/zaigezaigu/image/upload/v1770259475/zgzg-io-website/2026%E6%98%A5%E6%99%9A/%E5%96%9C%E9%B9%8A%E5%96%B3%E5%96%B3%E5%96%B3_gqzyzo.png
    description: |
      表演团体：SVDA
