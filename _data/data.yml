    title-en: Chinese New Year
    type: 开场
    type-en: Opening
    description: 过年啦！！！ 穿新衣，逛庙会，玩手绢儿，舞红绸。 一群可爱的东北小妞们，开心快乐的庆祝着新的一年的到来。各自展示着自己的独特绝活，给庆祝新年带来，更多姿多彩的气氛！
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_350/v1641972670/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/2_xwhlkl.png
    title: 涟漪
    title-en: Wind Over the Ripples
    type: 舞蹈
    type-en: Dance
    description: 春水浓如染，桃花破青山。春风吹皱江南，天色染透青衫。书生提笔绘纸鸢，假作彩鸾。愿涟漪点点落在姑娘心间。这支舞蹈表现了江南姑娘如水一般的灵动和柔情。水蓝色的裙子摇曳生姿如同湖面涟漪，落在观众心中。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641757236/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/3_h9qgbh.png
    title: 狮子王
    title-en: Can You Feel the Love Tonight
    type: 阿卡贝拉
    type-en: Acappella
    description: 拾乐团Find A Cappella 于2021 年10 月在南湾成立，是由一群在音乐中寻找快乐的青年组成的纯人声合唱团。他们将为大家带来一首萨瓦纳风格的情歌 —《狮子王》 插曲“Can You Feel the Love Tonight”.
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641757235/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/4_jhhscx.png
    title: 学电台
    title-en: Radio Talk
    type: 相声
    type-en: Chinese Traditional Comedy
    description: 当今社会是一个信息爆炸的时代, 书籍、电视、网络, 各种宣传媒介充斥的我们的生活。在信息洪流中, 还存在着一种“古老而小众”的方式, 那就是电台。存在于收音机中的电台向来准时, 直接, 节目也是五花八门。这种只闻其声, 不见其人的传播方式伴随着我们成长。在《学电台》这段节目中, 两位演员凭借舞台上的模仿, 便带领大家温习曾经的时光, 领略电台的魅力。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641757238/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/5_yrtt8j.png
    title: 黎明前出发
    title-en: Let’s Go Before Dawn
    type: 乐队
    type-en: Band
    description: 太啤寺是一支年轻的4 人乐队，喜爱Indie Rock， Blues，Funk 和喝啤酒。生活周而复始，岁月简单罗列，张扬的日子也许只是黄粱一梦，可它琳琅满目，万紫千红。和爱自由的太啤寺一起，在《黎明前出发》，去完成那些精彩的梦。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641757235/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/6_nj1uat.png
    title: 光亮
    title-en: Light
    type: 歌曲
    type-en: Singing
    description: 本节目为2021 载歌在谷想唱就唱歌手赛冠军直通春晚节目，由歌手赛冠军黄可一和乐队太啤寺合作完成。歌曲《光亮》温暖而又充满力量，唱出每一个平凡渺小的个体，在命运面前也依旧要坚强、努力，通过呐喊寻找“光亮”，寻找生命的一线生机，绝不放弃希望，做“最无畏的你”。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641757237/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/7_w7ox1f.png
    title: 奇迹嘉年华
    title-en: Miracle Carnival ｜魔术Magic Show
    type: 魔术
    type-en: Magic Show
    description: 你有亲身体验过奇迹吗？你有被人看穿过内心的想法吗？你有惊讶到合不拢嘴过吗？这个春节，Jack 带你遨游神奇的魔术海洋，届时会有空手变物、东西转换、读心术等等各种各样的惊喜，可能前一秒还是空空如也的黑布，下一刻就会出现一杯果汁；硬币在手中如同活过来一般忽隐忽现；随机选中的观众上台，也猜出心中藏最在最深处的秘密，想必票价也是超值了，快来坐上Jack 的奇幻之旅吧！
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641757235/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/8_dcghfo.png
    title: 赤焰之缨
    title-en: Red Spirit
    type: 舞蹈
    type-en: Dance
    description: 此节目是由北京舞蹈学院毕业的施皓柔老师编排而成。她同样毕业于美国米尔斯学院编舞系。编导巧妙地将东西方不同的文化进行融合创新，使东方古典舞和西方的爵士舞摩擦出绚丽的火花。团队中的每个人都很喜欢跳舞。舞者中有工程师，医药科学家，设计师，注册会计师.
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641757234/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/9_mptq1d.png
    title: 天蓝蓝
    title-en: Blue is the Sky
    type: 歌曲
    type-en: Singing
    description: 《天蓝蓝》是徐沛东作曲，乔羽作词的，为云南文山壮族苗族自治州创作的歌曲。歌曲将侗族大歌伴唱，广西山歌和广西小调等少数民族音乐元素融合，充分体现了壮族、苗族、侗族、彝族等西南少数民族的多样性。歌词唱出了对祖国山河画卷的赞美与对美好生活的殷切祝福。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641757234/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/10_plvfh4.png
    title: 阳光照耀着塔什库尔干
    title-en: Sunshine over Tashkurgan
    type: 器乐二重奏
    type-en: Piano Violin Ensemble
    description: 阳光照耀着塔什库尔干是一首极具中国特色民族风情的曲子，由编写梁祝的著名作曲人陈钢先生根据新疆民间音乐改编，描绘了祖国美丽的草原风光和牧民们载歌载舞的喜悦场景。“纵情高歌”展现了辽阔美丽的草原风光和牧民们骑在马上弹琴高歌的情景；“热烈欢舞”充分发挥了复杂多变敏捷灵活的技巧，表现了塔吉克人民欢腾的舞蹈的场面。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641763805/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/11_taicpg.png
    title: 街舞奇妙夜
    title-en: Fantasy Night of Street Dance
    type: 舞蹈
    type-en: Dance
    description: Enjoy Dance Studio (EDS) 是湾区最大的华人街舞工作室，向来以专业严谨的舞蹈教学和多元化的舞蹈风格著称，一直以来都活跃在湾区的各大舞台上， 为观众呈现了很多精彩的舞蹈作品。本次作品受《这！就是街舞》的启发，结合科幻的元素和题材，在展示街舞的魅力与多样性和EDS Family 全新面貌的同时，带领观众进行一次奇幻的体验。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641763804/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/12_vofv4z.png
    title: 我爱你中国
    title-en: I Love You China
    type: 乐队
    type-en: Band
    description: 走起乐队是ZGZG 社区老朋友，从第一届参与至今。走起乐队（Start-Up Band）成立于2013 年，由一群致力于在湾区传播华人音乐的华人工程师，科学界以及音乐专业人士组成。表演风格多样，近年来成功举办过多次专场演唱会，并活跃在“载歌在谷”春晚、斯坦福春晚、硅谷高创汇等湾区知名华人活动平台。今年的“载歌在谷”春晚，走起将为大家带来《我爱你中国》。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641779943/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/13_iodvut.png
    title: 爱的箴言
    title-en: The Motto of Love
    type: 歌曲
    type-en: Singing
    description: 一首经典的旋律，诉说和探讨着爱的真谛。由罗大佑作曲，邓丽君演唱的《爱的箴言》曾被无数次演绎过，而每个人心中的答案或许也都有些许不同。在这首歌中，爱是给予，是付出，是陪伴，也是默默守护。但也就像歌中所说，“爱是没有人能了解的的东西，爱是永恒的旋律”。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641779944/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/14_auocll.png
    title: 阿里郎随想
    title-en: Arirang Caprice
    type: 舞蹈
    type-en: Dance
    description: Q 舞团演绎的《阿里郎随想》是一支街舞与中国风的融合舞蹈。讲述了一位朝鲜族姑娘对爱情的憧憬和美好生活的向往，也表达了人们对未来太空世界的探索和追求。 Q 舞团由FLAG 等各大科技公司的工程师组成，作为专业篮球宝贝，她们被称为“最会编程的啦啦队”！她们不仅活跃在硅谷社区，更是走向世界。曾在Staples Center 南北加对抗赛，新浪3Ball USA 世界邀请赛，阿泰斯特丁彦雨航中美明星对抗赛等重量级活动中上演精彩演出。她们把优美的舞姿和对美好事物的向往分享给大家。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641779944/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/15_ruoyas.png
    title: 一生守候
    title-en: To Be with You
    type: 舞蹈
    type-en: Dance
    description: 舞蹈借由电影《大上海》里的插曲“一生守候”获得的创作灵感。故事讲述的是在民国时期，一对才子佳人的情缘缠绵，难分难舍的感情纠缠。才子终究还是走了，带着爱恨情愁，带着别离愁绪。浮生若梦，无情何欢？雨夜里感受他曾经逗留的背影，体会他指尖留下的余温，她在心底的一声叹息，也渐渐地被淹没在滚滚红尘中。一段难分难舍的感情，一段如诉如泣的纠缠。离与别，男与女，易相爱，难相守。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641779900/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/17_bjdplg.png
    title: 欢乐小才艺
    title-en: Delightful Tricks
    type: 魔术
    type-en: Magic Show
    description: 演员泽皮是现在就职于湾区科技公司的工程师。也是来自伊利诺伊州的青年魔术师. 本次表演中，魔术师将会在为大家展示如何用生活中常见的物品给大家创造惊喜。届时也会有幸运观众有机会上台和魔术师互动，和魔术师一起完成给剧院的观众的表演。本次是“载歌在谷”春晚开办以来，第一次为大家呈现近景魔术。“载歌在谷” 的节目组、技术组、摄制组的同学，克服种种技术难题，一同为大家在剧院现场呈现一个欢乐的魔术表演。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641779901/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/18_xqgbbh.png
    title: 春天的芭蕾
    title-en: The Spring Ballet
    type: 歌曲
    type-en: Singing
    description: 春节是春天的节日，是鲜花点缀, 是欢乐相随。声乐老师王甜甜，四川音乐学院毕业，Frame 乐队主唱，让我们一起聆听由她带来的这首春天的芭蕾，一起来感受春天的气息，迎接春天的来临。谷歌芭蕾舞团也会和着音乐翩翩起舞，带来具有古典主义风格的芭蕾伴舞，美丽而优雅。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641779900/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/19_ewl2gp.png
    title: 琵琶行Song
    title-en: of the Lute Player
    type: 器乐
    type-en: Instrument
    description: 《琵琶行》，是唐代诗人白居易创作的叙事诗。全篇叙述了作者由长安被贬黜到九江期间邂逅了一位技艺高超的琵琶女，用演奏委婉生动地讲述了自己凄惨的身世，引得诸人皆感怀自身境遇而落寞掩泣的故事。此作品由琵琶和舞蹈共同演绎，重现了元和十年浔阳江头的邂逅和千古名句 “同是天涯沦落人，相逢何必曾相识” 中所表达的豁达胸怀。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_300/v1641779900/zgzg-io-website/2022%E6%98%A5%E6%99%9A%E6%8B%8D%E6%91%84%E8%8A%B1%E7%B5%AE/20_gnp07n.png
    title: 诚
    title-en: Pilgrimage
    type: 舞蹈
    type-en: Dance
    description: 诚怀着无穷无尽力量的信仰，持着真诚朝拜路上的人儿。 双手高举合十，道声“扎西德勒”。

singerlist:
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1718561861/zgzg-io-website/2024singer/heyuan_ipzzfq.jpg
    name: 河源
    description: 我是何源，喜欢唱歌写歌。很开心跟大家分享我的音乐。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1718561861/zgzg-io-website/2024singer/dingmeng_duavrc.jpg
    name: 丁梦
    description: 大家好我是丁梦，一个处女座的ENTP。我喜欢各种类型的音乐，是Adam Lambert 12年的老粉。生活中可盐可甜，可攻可受，但本体永远是个失去表情管理的逗逼。我相信，听从内心的声音，脚下就是诗和远方。希望决赛大家都能唱的开心，听的尽兴！
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1718561890/zgzg-io-website/2024singer/hylas_rfnqi9.jpg
    name: Hylas
    description: 大家好我是Hylas。认识我的朋友都知道我有一只非常可爱的小狗，是我最宝贝的女儿。带着她去各个国家旅行，跑沙滩，走土路，滚草坪，是我最幸福的事。为了她我也换成了远程工作。我从很多年前就开始在网络上唱歌，这个爱好也保持到了现在。通过唱歌App学了很多新歌，也让我接触到了更多的曲风。很开心今年第二次来到这里，希望可以在这个舞台认识更多好朋友，分享音乐
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1718561862/zgzg-io-website/2024singer/zhangjinyuan_zyb1ju.jpg
    name: 张金源
    description: 哈喽，我是金源，朋友们喜欢叫我小源哥，平平无奇的科技大厂打工人、即将（估计也没那么快）上线原创单曲的业余唱作人、每年都换新曲风的叛逆歌手，毕竟不唱情歌的摇滚主唱不是好rapper
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1718561862/zgzg-io-website/2024singer/lanlan_kyrgze.jpg
    name: 兰兰
    description: 大家好，我是兰兰，是乐队Blankhead的主唱。音乐对我来说，不仅仅是声音的组合，更是一种独特的情感表达方式。它能带给我源源不断的快乐，让我体验到各种丰富的情绪和感受。我特别喜爱那些充满节奏感的歌曲，尤其钟情于欧美风格的音乐。在这些动感的旋律中，我不仅能够与我们乐队的成员尽情地歌唱，还可以与我舞团的朋友们一起随音乐起舞。我希望通过我的歌声，能够传递出快乐和活力，带给大家能量。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1718561861/zgzg-io-website/2024singer/xupeipei_aaxzga.jpg
    name: 徐珮珮
    description: 大家好，我是Peipei，一个在浴室里开了无数次演唱会的资深“歌手”，今天终于从浴室走向了舞台。敬请期待🫡
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1718561862/zgzg-io-website/2024singer/arielbao_iwn5wk.jpg
    name: Ariel Bao
    description: 大家好，我是Ariel。我来自杭州，现在在湾区做软件工程师。大学时期辅修古典声乐，也非常喜欢音乐剧和流行歌曲。非常荣幸参与歌手赛和分享我喜欢的音乐。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1718561861/zgzg-io-website/2024singer/tianlinduan_nxkcj0.jpg
    name: Tianlin Duan
    description: 哈喽大家好，我是Tianlin。很开心能站上歌手赛决赛的舞台，期待探索更多曲风，享受舞台，开发“无限可能”！决赛见～
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1718561862/zgzg-io-website/2024singer/zhouyu_s57msh.jpg
    name: 周遇
    description: 一个说唱爱好者，网易云搜索“周遇”可以找到我的主页，欢迎来玩✌️如果你也是哈利波特粉/金庸粉/UIUC毕业生，或许我的主页会有你觉得有趣的东西。业余喜欢和朋友一起做old-school说唱，近几年也有在接触new school的东西。可以说是Eminem、NF、王以太、Jony J和红花会的头号脑残粉🤣。计划不定期扛着音响去街头演出，感兴趣一起的朋友欢迎私信滴滴我(微信：Mg_schizo)

2025s-youth-singerlist:
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746344655/zgzg-io-website/2025%20singers/Sean_Zhang_Wide_q5u2hy.jpg
    name: 张韶杭
    description: 张韶杭(Sean Zhang)就读于 John Muir Elementary School 5th Grade，性格开朗温和，喜欢交朋友，和同学们一起玩。他喜欢唱歌，也擅长钢琴演奏，参加过湾区多次声乐比赛并获得名次。他也喜欢数学和写作，创作fan book小说，日常还参加了篮球训练，并且通过了武术蓝绿带考级。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746344035/zgzg-io-website/2025%20singers/Anastasia_Miin_Wide_e1qhnn.jpg
    name: Anastasia Miin
    description: Anastasia is a 14 years old 9th grade student from California. She began her vocal study at the age 7 and since then has participated in a variety of choirs and solo competitions. Anastasia has placed top 3 at NATS Western Region, first place in NATs SF, VOCE State, USIMC, and other competitions. Besides singing, Anastasia also plays the piano and enjoys Kpop dance classes during her free time.
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746344166/zgzg-io-website/2025%20singers/Ivy_Deng_Wide_yhulea.jpg
    name: Ivy Deng
    description: Ivy. 10岁. 酷爱唱歌表演. 旧金山音乐学院预科声乐系新生. 独唱演出代表作:载歌在谷舞台 (2025春季/2024秋季&冬季音乐会, 2024春晚, 2023秋季游园会), 2025 Sunnyvale 新春游园会. 比赛获奖:一等奖 (Charleston, BACH BIMC, NCYT), 二等奖 (American Protégé, 卡内基音乐厅获奖者音乐会). 音乐剧主演Nemo (@Spindrift).
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746345124/zgzg-io-website/2025%20singers/Zhu_Yunxi_Wide_hrkxcm.jpg
    name: Isabella Zhu
    description: Isabella Zhu (朱芸溪），14岁，喜欢唱歌和音乐剧表演。10岁开始学习声乐演唱，在学校以及多个活动演唱，并参演过多个音乐剧且担任主要角色。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746344297/zgzg-io-website/2025%20singers/Julia_Jiang_Wide_ob28fw.jpg
    name: Julia Jiang
    description: Julia，今年8岁，是一名三年级的小学生。她活泼开朗，热爱唱歌、跳舞和弹钢琴，是个多才多艺的小女孩。舞台是她最喜欢的地方，每一次表演她都全情投入。这次能站上唱歌比赛的决赛舞台，她非常开心，也希望用歌声把快乐带给大家！
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746344413/zgzg-io-website/2025%20singers/Brian_Xie_Wide_csq7gy.jpg
    name: Brian Xie
    description: 大家好，我是Brian！从小我就热爱唱歌，因为歌声能带给我无尽的快乐。6岁时，我开始正式学习声乐，8岁时通过了英皇声乐三级考试，并在NATS音乐剧比赛中荣获组别第二名。这些经历让我在学习声乐技巧和探索新曲目时更加充满热情与动力。希望我的歌声也能为大家带来快乐与感动！
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746344745/zgzg-io-website/2025%20singers/He_Zixi_Wide_ch0lnm.jpg
    name: Elena He
    description: 大家好！我是5岁的何梓熙 (Elena). 我喜欢迪士尼公主的梦幻世界，也喜欢跟着其他动感旋律摇摆。 我会把幼儿园的操场变成我的舞台，把家里的沙发当成观众席，随时随地大声地歌唱。我希望用我的歌声把美妙的小彩虹送给每个人。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746344570/zgzg-io-website/2025%20singers/Rosie_Cao_Wide_q95deb.jpg
    name: Rosie Cao
    description: My name is Rosie, and I’m born in Atlanta GA and grew up in Michigan. Now I’m 12 years old and a 7th grader in Michigan. I started piano at age 5 and violin at age 7. At the same time, I love singing, both English songs and Chinese songs! I’m grateful that my parents and sister can come with me to support me. I hope you will enjoy my performance!
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746345560/zgzg-io-website/2025%20singers/Ginnie_Tang_Wide_okej4g.jpg
    name: Ginnie Tang
    description: 唐茹婳(Ginnie Tang)，15岁，现就读于Independence high九年级。出生于上海，两岁时来到硅谷。茹婳从小喜欢唱歌，曾是福智合唱团和晶晶合唱团成员。作为福智青少年班成员，茹婳经常和伙伴们参与各种慈善活动，例如到老人院为老人们演唱和做饭。她每年都参加学校的音乐剧演出，曾在《Chocolate Factory》中饰演Charlie, 在《Little Mermaid》中饰演Ariel。在今年的全美中文学校联合会举办的中文歌曲比赛中获得青少年组第一名。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746344496/zgzg-io-website/2025%20singers/Maureen_Liu_Wide_p8oom6.jpg
    name: Maureen Liu
    description: 大家好！我是Maureen (晓晓）Liu，一个爱笑爱唱的阳光女孩！我喜欢唱歌，手工和花样游泳，每周训练让我学会了坚持与团队合作。音乐是我的快乐源泉，从儿童歌曲到流行曲，从中文歌到英文歌我都爱哼唱，站在舞台上用歌声传递快乐是我的梦想！希望能把这份热爱唱给你们听，请多多支持哦～谢谢！
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746506584/zgzg-io-website/2025%20singers/Zeng_Boxin_Wide_pememy.jpg
    name: 曾博欣
    description: 曾博欣，8岁的阳光女孩，带着对世界的好奇心快乐的成长。她是人见人爱的开心果，既能在音乐世界里自在徜徉，用清亮歌喉唱响童真，又像永不停歇的小探险家，总在观察思考中抛出其妙的问题。钢琴键上跃动的指尖、书本里专注的眼神、运动场上不服输的倔强、都在讲述这个女孩用热爱浇灌梦想、在挑战中不断突破自我成长的故事。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746403121/zgzg-io-website/2025%20singers/Wu_Feibi_Wide_i7by8z.jpg
    name: 吴飞碧
    description: 吴飞碧（Phoebe Wagner) 是一位来自加州山景城的12岁歌手、词曲创作者和表演者。她一直学习声乐和小提琴，曾与 iSing 女声合唱团以及包括Palo Alto Players 在内的湾区多家剧团合作演出。她参与过多部音乐剧，担任过主演和配角，包括《冰雪奇缘少儿版》、《音乐之声》和《查理和巧克力工厂少儿版》等。Phoebe 也喜欢创作原创音乐和诗歌。她的一首原创诗歌曾获得 Inklings 图书比赛的奖项，她的作品灵感多来自生活中的故事与情感。在舞台之外，她也展现出领导力——曾亲自策划并带领邻里孩子们举办了一周的夏令营，结合创意、组织能力和她对分享的热情。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746343882/zgzg-io-website/2025%20singers/Alicia_Chen_Wide_psca7s.jpg
    name: Alicia Chen
    description: Hello, my name is Alicia Chen. I'm 14 years old this year and currently in 9th grade. Singing is one of my favorite things to do, and I have been singing since I was 4 years old. My favorite singers are Selena Gomez and Rosé. Some of my other hobbies are dancing and playing the piano. Through this competition, I hope that I can develop lots of new friendships and have a great experience.
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746777682/zgzg-io-website/2025%20singers/Cindy_Peng_Wide_New_lcbgyv.jpg
    name: Cindy Peng
    description: 我是来自K班的Cindy Peng！从小“我”就是个"小戏精"，最爱跟着爸爸的钢琴又唱又跳，把客厅当成“我”的专属舞台。每年最盼望的就是春节，因为可以一遍遍看春晚学表演！3岁开始，“我”就和爸爸在社区图书馆音乐会演出，现在已经是个拥有15次舞台经验的"小演员"啦！这次载歌载谷的舞台，“我”要把这份快乐传递给在场的每一位大朋友小朋友！
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1747028329/zgzg-io-website/2025%20singers/Astrid_Zhou_Wide_lemubx.jpg
    name: 周妙宸
    description: 大家好，我是来自K班的Astrid，周妙宸～我喜欢唱歌，拉丁舞，画画，去年进入天使合唱团跟着小鹿老师学唱歌后，更加喜欢上了表演，合唱让我认识到了很多好朋友，后来还很幸运地参加了小小音乐剧的表演，让我更加享受在舞台上的感觉～
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746401881/zgzg-io-website/2025%20singers/Li_Zhengmo_Wide_mcdx36.jpg
    name: 李正墨
    description: 李正墨是一个阳光开朗的10岁女孩，歌声大气嘹亮，舞姿灵动。她从小热爱舞台，多次在本地少儿歌唱比赛中取得好成绩，用大气的嗓音演绎喜欢的歌曲。无论是比赛还是表演，她总是自信地展现歌舞才华，用表演传递快乐与活力。未来，她希望站上更大的舞台，用歌声与舞蹈点亮更多人的梦想！
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746402215/zgzg-io-website/2025%20singers/Li_Zhengmo_Li_Zhengyan_Wide_qwsyf3.jpg
    name: 李正墨&李正言
    description: 李正墨和李正言是一对活泼可爱的10岁双胞胎姐妹，凭借大气嘹亮的嗓音和默契的配合，成为备受喜爱的小歌手组合。她们曾多次登台表演，以纯净的歌声和治愈的笑容打动观众。此次，姐妹俩将深情演唱《是妈妈是女儿》，用童真诠释亲情的温暖，传递母女间最真挚的爱。期待她们用天籁之音，再次带来感动与惊喜！
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746402596/zgzg-io-website/2025%20singers/Ella_Tang_Wide_nok3qp.jpg
    name: Ella Liu
    description: 大家好，我是Ella，我今年四岁。我喜欢唱歌、钢琴、画画、体操，虽然平时有点小害羞，但一唱起歌就开心得不得了！这是我第一次一个人上台，希望大家喜欢我的表演。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746345470/zgzg-io-website/2025%20singers/Mia_Wang_Wide_oyjvjr.jpg
    name: Mia Wang
    description: 我的名字叫Mia Wang。今年13岁。我喜欢唱歌，特别是中国歌曲，跳kpop和打排球。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1746344973/zgzg-io-website/2025%20singers/Peng_Suxin_Wide_ngtaj8.jpg
    name: 彭素心
    description: 我叫彭素心，8岁，是St Andrews Episcopal School小学二年级的学生，从小喜欢就唱歌。在吴树德老师指导的天使合唱团和小朋友们一起把古诗词唱给大家。

2026s-youth-finalists:
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1777703807/zgzg-io-website/2026%E9%9D%92%E5%B0%91%E5%B9%B4%E6%AD%8C%E6%89%8B%E8%B5%9B/Elena_He_trj42f.jpg
    name: Elena He
    round1_song: "How Far I'll Go"
    round2_song: For the first time in forever
    description: |
      大家好，我是Elena，今年6岁。我是一只喜欢唱歌的小蝴蝶，喜欢在舞台上自由自在地“飞”。从小我就特别喜欢唱歌和表演，每次站上舞台，我都会用心设计动作，把我的热情展现给大家。我已经拿到了好几个歌唱比赛的奖项，比如American Protege We Sing Pop比赛（不限年龄组）的二等奖，还有湖南卫视“名师有高徒”幼儿组的冠军。多次的表演也让我收获了满满的掌声和鼓励。我希望以后能飞到更多更大的舞台，把我对唱歌的热爱分享给更多人听。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1777703804/zgzg-io-website/2026%E9%9D%92%E5%B0%91%E5%B9%B4%E6%AD%8C%E6%89%8B%E8%B5%9B/Cindy_Peng_n2up5t.jpg
    name: Cindy Peng
    round1_song: Part of Your World
    round2_song: Candle on the Water
    description: |
      Cindy是一名一年级的小朋友，喜欢唱歌、钢琴、中国舞和主持。音乐是她生活的一部分：入睡、坐车、日常点滴中都离不开旋律的陪伴。

      她喜欢反复欣赏喜爱的舞台表演，并尝试模仿，在轻松自然中培养表达与自信。在家里，客厅就是她的小舞台——爸爸弹琴，她唱歌；也常和朋友们参与图书馆与社区的公益演出。曾参加本地歌唱比赛并取得不错的成绩，也在合唱团中积累舞台经验。

      入围“载歌载谷”决赛，她期待把这份热爱分享给更多人。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1777703807/zgzg-io-website/2026%E9%9D%92%E5%B0%91%E5%B9%B4%E6%AD%8C%E6%89%8B%E8%B5%9B/Valerie_Zhang_zso5gp.jpg
    name: Valerie Zhang
    round1_song: 待公布
    round2_song: 待公布
    description: 2026 青少年歌手赛决赛选手介绍占位。敬请期待正式发布。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1777703810/zgzg-io-website/2026%E9%9D%92%E5%B0%91%E5%B9%B4%E6%AD%8C%E6%89%8B%E8%B5%9B/astrid_zhou_iuzfix.jpg
    name: Astrid Zhou
    round1_song: Tomorrow
    round2_song: I see the light
    description: |
      大家好，我是Astrid，周妙宸，是一个爱唱歌，爱笑的小女孩～
      我喜欢唱歌，不管是在家里、车上、教室里、公园里，我都会忍不住哼起来～我还喜欢画画和跳拉丁舞～我也参加过一些表演，每一次站在舞台上，我都特别开心，就像在和大家分享我的小快乐一样！
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1777703808/zgzg-io-website/2026%E9%9D%92%E5%B0%91%E5%B9%B4%E6%AD%8C%E6%89%8B%E8%B5%9B/%E4%BB%99%E4%BB%99_vp1h3o.jpg
    name: 仙仙
    round1_song: 待公布
    round2_song: 待公布
    description: 2026 青少年歌手赛决赛选手介绍占位。敬请期待正式发布。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1777703810/zgzg-io-website/2026%E9%9D%92%E5%B0%91%E5%B9%B4%E6%AD%8C%E6%89%8B%E8%B5%9B/Madison_Headshot_eg4vi9.jpg
    name: Madison Truong
    round1_song: Let's go fly a kite
    round2_song: A lovely night
    description: Madison Truong loves performing and truly enjoys being on stage, bringing energy and passion to every performance.
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1777703807/zgzg-io-website/2026%E9%9D%92%E5%B0%91%E5%B9%B4%E6%AD%8C%E6%89%8B%E8%B5%9B/Emelia_Wang_sllntx.jpg
    name: Emilia Wang
    round1_song: 崖上的波妞
    round2_song: proud of you
    description: |
      大家好，我是Emilia Wang，7岁，就读于 Stratford School 二年级。

      我从5岁开始学习声乐，在专业老师的指导下，逐渐学会用歌声表达情感，这次我带来的歌曲是《崖上的波妞》，一首充满童真与想象的作品。

      除了唱歌，我也喜欢芭蕾舞和体操，这让我在舞台上更加自信和勇敢。

      希望用我的歌声，把快乐带给大家🎶
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1777703807/zgzg-io-website/2026%E9%9D%92%E5%B0%91%E5%B9%B4%E6%AD%8C%E6%89%8B%E8%B5%9B/Ethan_Yuan_zpsk8e.png
    name: Ethan Yuan
    round1_song: 待公布
    round2_song: 待公布
    description: 2026 青少年歌手赛决赛选手介绍占位。敬请期待正式发布。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1777703810/zgzg-io-website/2026%E9%9D%92%E5%B0%91%E5%B9%B4%E6%AD%8C%E6%89%8B%E8%B5%9B/%E6%88%98%E6%94%BE_hkrswr.jpg
    name: 战放
    round1_song: Almost Nearly Perfect
    round2_song: Do You Want to Build a Snowman?
    description: |
      大家好！我叫战放，今年8岁啦。我的名字特别好记——自信的“绽”，盛开的“放”。就像我的名字一样，我是一个爱笑、爱唱，渴望在舞台上灿烂“绽放”的小姑娘。

      对我来说，音符是会跳舞的小精灵，旋律是心情的调色盘。

      这次来到比赛舞台，我不仅带来了我的小嗓门，还带了一大口袋的快乐！希望我的歌声能像彩色泡泡一样，飞进每个人的心里。请大家记住这个爱唱歌的战放，看我在这个舞台上，美美地绽放！
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1777703807/zgzg-io-website/2026%E9%9D%92%E5%B0%91%E5%B9%B4%E6%AD%8C%E6%89%8B%E8%B5%9B/Jaslin_Wang_lgkzsg.jpg
    name: Jaslin Wang
    round1_song: 今天是你的生日，妈妈
    round2_song: How can I keep from singing
    description: |
      我是Jaslin Wang（王梓琳），今年9岁。我学习声乐已有两年多的时间，对舞台充满热爱。在艺术成长的道路上，我跟随我的老师，不仅专注于独唱技巧的打磨，还积极参与合唱及各类综合性艺术表演，积累了丰富的舞台经验。唱歌是我表达情感、分享快乐的方式，希望能通过这次比赛展示我的进步与风采。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1777703805/zgzg-io-website/2026%E9%9D%92%E5%B0%91%E5%B9%B4%E6%AD%8C%E6%89%8B%E8%B5%9B/Jennifer_Yu_e4rgec.jpg
    name: Jennifer Yu
    round1_song: Red River Valley
    round2_song: Greensleeves
    description: |
      大家好，我叫Jennifer, 今年11岁。5岁起加入合唱团学习声乐，在歌声中不断挑战自我、锻炼自我，收获成长，也收获友谊。在团队中学会合作，增强集体意识，让我变得更加自信与坚定。我喜欢小动物，也热爱花样游泳和跳舞。这是我第一次站上这么大的舞台，虽然有一点点紧张，但更多的是期待与开心——期待在舞台上遇见更好的自己！
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/v1777703811/zgzg-io-website/2026%E9%9D%92%E5%B0%91%E5%B9%B4%E6%AD%8C%E6%89%8B%E8%B5%9B/Alexander_Wang_o788gs.jpg
