  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_350/v1673054834/zgzg-io-website/2023%E6%98%A5%E6%99%9A/%E5%AE%9A%E5%A6%86%E7%85%A7/%E6%A2%A8%E5%9B%AD%E5%A6%9E%E5%A6%9E-min_t6f7dy.jpg
    title: 梨园妞妞
    title-en: Peking Opera Dream
    type: 开场
    type-en: Opening
    description: 一群可爱的小学员，在梨园努力练习，希望早日圆梦，成为真正优秀的京剧演员。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_350/v1673054840/zgzg-io-website/2023%E6%98%A5%E6%99%9A/%E5%AE%9A%E5%A6%86%E7%85%A7/%E9%86%89%E6%98%A5%E9%A3%8E-min_etvdqh.jpg
    title: 醉春风
    title-en: Soaking in the Spring Breeze
    type: 舞蹈
    type-en: Dance
    description: 醉春意，弄花影，舞花扇， 俏、羞、媚、喜戏春风。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_350/v1673054833/zgzg-io-website/2023%E6%98%A5%E6%99%9A/%E5%AE%9A%E5%A6%86%E7%85%A7/%E6%95%95%E5%8B%92%E6%AD%8C%E9%BA%92%E9%BA%9F-min_oocuir.jpg
    title: 敕勒歌·麒麟
    title-en: The Tale of Chi-Le and Qi-Lin
    type: 歌曲
    type-en: Singing
    description: 敕勒歌歌颂着黄河以北敕勒人热爱家乡和生活的豪情；麒麟呐喊出浩气英风的人生态度。北国草原壮丽富饶的风光遇上象征祥瑞的中华神兽，融合成一种别样的民族风。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_350/v1673054838/zgzg-io-website/2023%E6%98%A5%E6%99%9A/%E5%AE%9A%E5%A6%86%E7%85%A7/%E7%BE%A4%E8%8A%B3%E8%B0%B1-min_rsxxqt.jpg
    title: 群芳谱
    title-en: Surpassing Gorgeous
    type: 舞蹈
    type-en: Dance
    description: 国风有佳人，容华若桃李。戏探窗前人，娇媚动心魂。问，何谓伊人，皆，在我群芳。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_350/v1673054838/zgzg-io-website/2023%E6%98%A5%E6%99%9A/%E5%AE%9A%E5%A6%86%E7%85%A7/%E5%AD%A6%E6%BB%A1%E8%AF%AD-min_no0n1u.jpg
    title: 学满语
    title-en: Let’s Go Before Dawn
    type: 相声
    type-en: Crosstalk
    description: 这段传统相声以幽默诙谐的方式介绍了我国的民族语言满语 也讽刺了少数人不懂装懂，好为人师的不良风气。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_350/v1673054831/zgzg-io-website/2023%E6%98%A5%E6%99%9A/%E5%AE%9A%E5%A6%86%E7%85%A7/%E4%B9%90%E9%98%9F-band-min_l4kpch.jpg
    title: 梦里乏味百花香
    title-en: Awoken by Scent of a Flower
    type: 乐队
    type-en: Band
    description: 一首充满放克节奏和激烈鼓点的Deca Joins cover 《乏善可陈》望点燃舞台气氛，紧随其后的是第二首与京胡演奏家王小朋老师一同并肩作战改编的歌曲《梦里花》来展现一场摇滚乐和中国传统民间音乐的文化碰撞。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_350/v1673054833/zgzg-io-website/2023%E6%98%A5%E6%99%9A/%E5%AE%9A%E5%A6%86%E7%85%A7/%E7%88%B1%E7%9A%84%E7%81%AB%E6%8A%8A%E8%8A%82-min_xlngub.jpg
    title: 竹竿舞 - 爱的火把节
    title-en: Fire of Love
    type: 舞蹈
    type-en: Dance
    description: 傣族舞、国风街舞和彝族舞，用传统和现代的碰撞和融合来表达节日里欢快的气氛和喜悦。希望能把这份喜悦和热情传达给所有人。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_350/v1673054836/zgzg-io-website/2023%E6%98%A5%E6%99%9A/%E5%AE%9A%E5%A6%86%E7%85%A7/%E6%9C%89%E7%94%9F%E4%B9%8B%E5%B9%B4-min_oljjsw.jpg
    title: 有生之年
    title-en: As Long as I Live
    type: 歌曲
    type-en: Singing
    description: 有生之年唱尽人世间最美好的祝福。用最真挚的情，最温暖的爱，祝愿你拥有一切美好。就像歌中说的：“有生之年，愿你没有遗憾；愿你历经时间，仍是少年。”
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_350/v1673054833/zgzg-io-website/2023%E6%98%A5%E6%99%9A/%E5%AE%9A%E5%A6%86%E7%85%A7/%E7%BA%A2%E9%AB%98%E7%B2%B1-min_gxgo4r.jpg
    title: 红高粱
    title-en: Red Sorghum
    type: 舞蹈
    type-en: Dance
    description: 根据电影红高梁改编，用舞蹈讲述在封建社会的一对男女一段如泣如诉的爱情故事。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_350/v1673054835/zgzg-io-website/2023%E6%98%A5%E6%99%9A/%E5%AE%9A%E5%A6%86%E7%85%A7/%E6%BC%94%E5%87%BA%E5%BF%85%E9%A1%BB%E7%BB%A7%E7%BB%AD-min_gxvapf.jpg
    title: 演出必须继续
    title-en: The Show Must Go On
    type: 小品
    type-en: Short Sketch
    description: 东拼西凑的戏班，状况频出的舞台，突然开始的演出，会让简单的三顾茅庐演绎出什么样故事？不管怎么说，演出必须继续！载歌在谷独家出品，陪你爆笑过大年。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_350/v1673054838/zgzg-io-website/2023%E6%98%A5%E6%99%9A/%E5%AE%9A%E5%A6%86%E7%85%A7/%E9%87%8D%E5%90%AF-min_v97zkp.jpg
    title: 重启
    title-en: Reset
    type: 舞蹈
    type-en: Dance
    description: 隔离的生活让很多人逐渐消沉。如果时间能重启，世界没有经历这次浩劫，我们会怎样呢？演员杨青青等。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_350/v1673054833/zgzg-io-website/2023%E6%98%A5%E6%99%9A/%E5%AE%9A%E5%A6%86%E7%85%A7/%E9%AD%94%E6%9C%AF-min_ezh6nx.jpg
    title: 世界上最著名的胡萝卜魔术
    title-en: The Best Known Carrot Magic Trick in the World
    type: 魔术
    type-en: Magic Show
    description: 魔术表演都是迷，节目介绍也是迷。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_350/v1673054836/zgzg-io-website/2023%E6%98%A5%E6%99%9A/%E5%AE%9A%E5%A6%86%E7%85%A7/%E6%9C%9F%E8%AE%B8-min_ofwjhk.jpg
    title: 期许
    title-en: Hope
    type: 舞蹈
    type-en: Dance
    description: 用这一生一世的期许，为和你屋檐下听一场雨。演员杨洋, 王晓明。
  - image: https://res.cloudinary.com/zaigezaigu/image/upload/t_auto_eco_compression/c_scale,w_350/v1673054838/zgzg-io-website/2023%E6%98%A5%E6%99%9A/%E5%AE%9A%E5%A6%86%E7%85%A7/%E7%A7%80%E5%B1%B1%E6%83%85%E6%AD%8C-min_fj73sa.jpg
    title: 新年组曲
    title-en: Chinese New Year Medley
    type: 民乐
    type-en: Modern Chinese Orchestra
    description: 旋律轻快激昂的《步步高》赋予人们奋发上进的积极意义 ；四川民歌《太阳出来喜洋洋》表达着热烈欢腾、昂扬兴奋之情；《金蛇狂舞》生动地展现喜庆时巨龙舞动、锣鼓喧天的欢腾气氛。

